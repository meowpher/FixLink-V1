{% extends "base.html" %}
{% block title %}Login - MIT-WPU FixLink{% endblock %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/logo-lm.png') }}" alt="MIT-WPU Logo" class="form-logo mb-3">
                        <h3 class="mt-3">Welcome Back</h3>
                        <p class="text-muted">Sign in to your account</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.login') }}">
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required placeholder="name@mitwpu.edu.in">
                        </div>
                        <div class="mb-1">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" name="password" id="loginPassword" class="form-control" required>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePwd()" tabindex="-1">
                                    <i class="bi bi-eye" id="loginEyeIcon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="text-end mb-4">
                            <a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none small text-muted">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p>Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-decoration-none">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePwd() {
    const inp  = document.getElementById('loginPassword');
    const icon = document.getElementById('loginEyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        inp.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
{% endblock %}
