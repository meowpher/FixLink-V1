{% extends "base.html" %}
{% block title %}Forgot Password - MIT-WPU FixLink{% endblock %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-key display-4 text-primary"></i>
                        <h3 class="mt-3">Forgot Password?</h3>
                        <p class="text-muted">Enter your MIT-WPU email and we'll send you a reset link.</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required
                                   placeholder="name@mitwpu.edu.in" value="{{ email|default('') }}">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Link</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="{{ url_for('auth.login') }}" class="text-decoration-none small text-muted">
                            <i class="bi bi-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
