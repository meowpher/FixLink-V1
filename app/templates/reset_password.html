{% extends "base.html" %}
{% block title %}Reset Password - MIT-WPU FixLink{% endblock %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock display-4 text-primary"></i>
                        <h3 class="mt-3">Reset Password</h3>
                        <p class="text-muted">Choose a new password for your account.</p>
                    </div>

                    <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <div class="input-group">
                                <input type="password" name="password" id="resetPwd" class="form-control" required minlength="8">
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('resetPwd','resetEye')" tabindex="-1">
                                    <i class="bi bi-eye" id="resetEye"></i>
                                </button>
                            </div>
                            <div class="form-text">At least 8 characters.</div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <input type="password" name="confirm_password" id="resetConfirm" class="form-control" required minlength="8">
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('resetConfirm','confirmEye')" tabindex="-1">
                                    <i class="bi bi-eye" id="confirmEye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Save New Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function togglePassword(inputId, iconId) {
    const inp  = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === 'password') {
        inp.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        inp.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
{% endblock %}
