{% extends "base.html" %}
{% block title %}Sign Up - MIT-WPU FixLink{% endblock %}
{% block content %}
<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='images/logo-lm.png') }}" alt="MIT-WPU Logo" class="form-logo mb-3">
                        <h3 class="mt-3">Student Sign Up</h3>
                        <p class="text-muted">Create an account to report issues</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.signup') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" name="name" class="form-control" required value="{{ name|default('') }}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">PRN</label>
                            <input type="text" name="prn" class="form-control" required value="{{ prn|default('') }}">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" required placeholder="name@mitwpu.edu.in" value="{{ email|default('') }}">
                            <div class="form-text">Must be a valid @mitwpu.edu.in email.</div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
